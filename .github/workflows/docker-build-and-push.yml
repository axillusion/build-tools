name: Docker release (multi-arch)

on:
  workflow_call:
    inputs:
      image:
        description: "Full image name, e.g., ghcr.io/org/app"
        required: true
        type: string
      context:
        description: "Build context"
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        default: "Dockerfile"
        type: string
      platforms:
        description: "Target platforms"
        default: "linux/amd64,linux/arm64"
        type: string
      version:
        description: "Version tag (omit to derive from the Git tag)"
        required: false
        type: string
      add_latest:
        description: "Also push :latest"
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Resolve version
        id: v
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            if [ "${{ github.ref_type }}" = "tag" ]; then
              # Accept tags like v1.2.3 or 1.2.3; strip leading 'v' if present
              V="${{ github.ref_name }}"
              V="${V#v}"
            else
              echo "No inputs.version provided and not a tag run; pass inputs.version or trigger on a tag (vX.Y.Z)."
              exit 1
            fi
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Resolved version: $V"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create temporary Maven settings.xml (for BuildKit)
        shell: bash
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">

            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>

            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/doda2025-team20/lib-version</url>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>

            <servers>
              <server>
                <id>github</id>
                <username>$GH_ACTOR</username>
                <password>$GH_TOKEN</password>
              </server>
            </servers>
          </settings>
          EOF
          chmod 600 settings.xml

      - name: Build and push (multi-arch)
        env:
          IMAGE: ${{ inputs.image }}
          VERSION: ${{ steps.v.outputs.version }}
          CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          PLATFORMS: ${{ inputs.platforms }}
          ADD_LATEST: ${{ inputs.add_latest }}
        shell: bash
        run: |
          TAGS="-t ${IMAGE}:${VERSION}"
          if [ "${ADD_LATEST}" = "true" ]; then
            TAGS="$TAGS -t ${IMAGE}:latest"
          fi

          docker buildx build \
            --platform "${PLATFORMS}" \
            ${TAGS} \
            -f "${DOCKERFILE}" \
            "${CONTEXT}" \
            --secret id=m2,src=./settings.xml \
            --push
